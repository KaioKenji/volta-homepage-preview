<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Volta Workspace Layout Prototype</title>
<link rel="icon" href="codex-20260707-volta-icon-navy-turquoise.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#071d35;
  --navy-2:#0d2a49;
  --teal:#0a7975;
  --teal-2:#59cdc6;
  --teal-soft:#e3f8f7;
  --canvas:#f0f7f9;
  --canvas-2:#f5f8fa;
  --surface:#fff;
  --surface-2:#e2edf0;
  --ink:#091d36;
  --ink-2:#3a4f65;
  --ink-3:#697d8e;
  --line:#d0dfe5;
  --line-strong:#a3b4bf;
  --warning:#93621a;
  --warning-soft:#fff6e5;
  --danger:#b33f46;
  --danger-soft:#fff0f1;
  --success:#18775d;
  --success-soft:#e9f6f1;
  --info:#356d91;
  --info-soft:#edf5fa;
  --radius:6px;
  --control-radius:4px;
  --shadow:0 6px 14px rgb(9 29 54 / .08);
  --sidebar:232px;
  --gutter:24px;
  --baseline:8px;
  --max:1360px;
  --sans:Manrope,Inter,Segoe UI,sans-serif;
  --mono:"DM Mono",Consolas,monospace;
}
*{box-sizing:border-box}
html{background:var(--canvas);color:var(--ink);font:14px/1.5 var(--sans)}
body{margin:0;min-width:320px;background:var(--canvas)}
button,input{font:inherit}
button,a{outline-offset:3px}
button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--teal)}
button{color:inherit}
.app{min-height:100vh;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr)}
.sidebar{position:sticky;top:0;height:100vh;padding:24px 16px 18px;background:#fff;color:var(--ink);border-right:1px solid var(--line);display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:11px;padding:0 9px 22px}
.brand-mark{display:grid;width:34px;height:34px;place-items:center}
.brand img{width:34px;height:34px}
.brand strong{display:block;font-size:15px;font-weight:600}
.brand span{display:block;color:var(--ink-3);font-size:11px}
.sidebar-search{display:flex;width:100%;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;padding:9px 10px;border:1px solid var(--line);border-radius:var(--control-radius);background:#fff;color:var(--ink-2);cursor:pointer}
.sidebar-search kbd{border:1px solid var(--line);border-radius:3px;background:var(--surface-2);padding:1px 5px;color:var(--ink-3);font:400 10px/1.4 var(--mono)}
.workspace-label{margin:0 10px 6px;color:var(--ink-3);font-size:11px;font-weight:500}
.nav{display:grid;gap:4px}
.nav a{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--control-radius);color:var(--ink-2);text-decoration:none}
.nav a:hover{background:var(--surface-2);color:var(--ink)}
.nav a[aria-current="page"]{background:var(--teal-soft);color:var(--ink)}
.nav-copy strong,.nav-copy span{display:block}
.nav-copy strong{font-size:13px;font-weight:500}
.nav-copy span{margin-top:1px;color:var(--ink-3);font-size:10px}
.nav small{min-width:20px;padding:2px 6px;border-radius:999px;background:var(--surface-2);text-align:center;font:500 10px/1.4 var(--mono)}
.nav a[aria-current="page"] small{background:var(--teal-2);color:var(--ink)}
.sidebar-bottom{display:grid;gap:14px;margin-top:auto}
.settle-stat{display:block;padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--canvas-2);color:var(--ink);text-decoration:none}
.settle-stat:hover{border-color:var(--line-strong);background:var(--teal-soft)}
.settle-stat span,.settle-stat strong{display:block}
.settle-stat span{color:var(--ink-3);font-size:11px}
.settle-stat strong{margin:4px 0;font:500 30px/1.05 var(--mono)}
.settle-stat small{color:var(--ink-2)}
.profile{display:flex;align-items:center;gap:9px;padding:0 8px}
.avatar{display:grid;width:30px;height:30px;place-items:center;border-radius:var(--control-radius);background:var(--surface-2);font:500 10px/1 var(--mono)}
.profile strong,.profile span{display:block}
.profile strong{font-size:12px;font-weight:500}
.profile span{color:var(--ink-3);font-size:10px}
.content{min-width:0;padding:36px clamp(24px,4vw,56px) 104px;background:var(--canvas-2)}
.content-inner{width:min(100%,var(--max));margin:0 auto}
.page-head{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));column-gap:var(--gutter);align-items:end;margin-bottom:24px}
.head-copy{grid-column:1 / span 7}
.head-copy h1{margin:0 0 4px;font-size:30px;line-height:1.2;font-weight:500;letter-spacing:0;text-wrap:balance}
.head-copy p{max-width:66ch;margin:0;color:var(--ink-2)}
.screen-switch{grid-column:9 / -1;justify-self:end;display:inline-flex;padding:3px;background:var(--surface-2);border-radius:var(--radius)}
.screen-switch button{min-height:36px;padding:0 14px;border:0;border-radius:var(--control-radius);background:transparent;color:var(--ink-2);cursor:pointer}
.screen-switch button[aria-pressed="true"]{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.14)}
.summary-strip{display:flex;align-items:stretch;margin-bottom:16px;border-radius:var(--radius);background:var(--surface-2);overflow:hidden}
.summary-item{min-width:170px;padding:14px 18px}
.summary-item:first-child{flex:1}
.summary-item span{display:block;color:var(--ink-2);font-size:12px}
.summary-item strong{display:block;margin-top:2px;font-size:19px;font-weight:500}
.summary-item em{font-style:normal;color:var(--teal);font-weight:500}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.searchbox{position:relative;flex:1;max-width:420px}
.searchbox input{width:100%;height:42px;padding:0 13px;border:1px solid var(--line-strong);border-radius:var(--radius);background:#fff;color:var(--ink)}
.searchbox input::placeholder{color:#64798a}
.filters{display:flex;gap:4px;padding:3px;background:var(--surface-2);border-radius:var(--radius);overflow-x:auto}
.filter{height:34px;padding:0 12px;border:0;border-radius:var(--control-radius);background:transparent;color:var(--ink-2);white-space:nowrap;cursor:pointer}
.filter[aria-pressed="true"]{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.btn{display:inline-flex;min-height:36px;align-items:center;justify-content:center;padding:0 14px;border:1px solid var(--line-strong);border-radius:var(--control-radius);background:#fff;color:var(--ink);font-weight:500;text-decoration:none;cursor:pointer}
.btn:hover{background:#f7fafb}
.btn.primary{border-color:var(--teal);background:var(--teal);color:#fff}
.btn.primary:hover{background:#0a746f}
.btn.danger{border-color:#e3aeb4;color:var(--danger)}
.btn:disabled{border-color:var(--line);background:#eef2f4;color:#8595a1;cursor:not-allowed}
.table-shell{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 7px rgba(0,0,0,.07)}
.data-table{width:100%;border-collapse:collapse;table-layout:fixed}
.data-table th{padding:12px 16px;background:#f3f6f8;color:var(--ink-3);font-size:11px;font-weight:500;text-align:left}
.data-table td{padding:15px 16px;border-top:1px solid var(--line);vertical-align:middle}
.data-table tbody tr{cursor:pointer}
.data-table tbody tr:hover{background:#f7fbfb}
.data-table tbody tr[aria-selected="true"]{background:var(--teal-soft)}
.name-cell strong{display:block;font-weight:500}
.name-cell span{display:block;margin-top:2px;color:var(--ink-3);font:400 11px/1.4 var(--mono)}
.mono{font-family:var(--mono)}
.amount{font:500 14px var(--mono)}
.owner{color:var(--ink-2)}
.status{display:inline-flex;align-items:center;gap:6px;min-height:25px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:500;white-space:nowrap}
.status::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.status.review{background:var(--danger-soft);color:var(--danger)}
.status.wait{background:var(--warning-soft);color:var(--warning)}
.status.ready{background:var(--success-soft);color:var(--success)}
.status.info{background:var(--info-soft);color:var(--info)}
.row-action{display:inline-flex;align-items:center;gap:6px;color:var(--teal);font-weight:500}
.master-grid{display:grid;grid-template-columns:340px minmax(0,1fr);gap:var(--gutter);align-items:start}
.queue-pane,.work-pane{min-width:0;background:#fff;border-radius:var(--radius);box-shadow:0 2px 7px rgba(0,0,0,.07)}
.pane-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:18px 20px;background:#f3f6f8}
.pane-head h2{margin:0;font-size:17px;font-weight:500}
.pane-head p{margin:3px 0 0;color:var(--ink-2);font-size:12px}
.queue-list{display:grid}
.queue-row{width:100%;padding:15px 18px;border:0;border-top:1px solid var(--line);background:#fff;text-align:left;cursor:pointer}
.queue-row:hover{background:#f7fbfb}
.queue-row[aria-pressed="true"]{background:var(--teal-soft)}
.queue-row strong{display:flex;justify-content:space-between;gap:12px;font-weight:500}
.queue-row span{display:block;margin-top:5px;color:var(--ink-2);font-size:12px}
.queue-row small{display:block;margin-top:7px;color:var(--ink-3);font:400 11px var(--mono)}
.pane-tools{padding:14px 16px;background:#fff;border-top:1px solid var(--line)}
.pane-tools .searchbox{max-width:none}
.work-body{padding:24px}
.record-head{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:24px}
.record-head h2{margin:0 0 4px;font-size:23px;font-weight:500}
.record-head p{margin:0;color:var(--ink-2)}
.record-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.decision{padding:20px;background:var(--teal-soft);border-radius:var(--radius);margin-bottom:24px}
.decision h3{margin:0 0 5px;font-size:16px;font-weight:500}
.decision p{max-width:68ch;margin:0 0 16px;color:var(--ink-2)}
.choice-row{display:flex;gap:8px;flex-wrap:wrap}
.choice{padding:11px 13px;border:1px solid var(--line-strong);border-radius:var(--radius);background:#fff;text-align:left;cursor:pointer}
.choice[aria-pressed="true"]{border-color:var(--teal);box-shadow:inset 0 0 0 1px var(--teal)}
.choice strong{display:block;font:500 15px var(--mono)}
.choice span{display:block;color:var(--ink-2);font-size:11px}
.facts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.fact{padding:0 0 16px;border-bottom:1px solid var(--line)}
.fact span{display:block;color:var(--ink-3);font-size:11px}
.fact strong{display:block;margin-top:4px;font-weight:500}
.tabs{display:flex;gap:18px;margin:-4px 0 20px;border-bottom:1px solid var(--line)}
.tab{padding:10px 1px;border:0;border-bottom:2px solid transparent;background:transparent;color:var(--ink-2);cursor:pointer}
.tab[aria-pressed="true"]{border-color:var(--teal);color:var(--ink)}
.action-groups{display:grid;gap:24px}
.action-group{background:#fff;border-radius:var(--radius);box-shadow:0 2px 7px rgba(0,0,0,.07);overflow:hidden}
.group-head{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:15px 18px;background:#f3f6f8}
.group-head h2{margin:0;font-size:16px;font-weight:500}
.group-head p{margin:2px 0 0;color:var(--ink-2);font-size:12px}
.group-count{font:500 13px var(--mono);color:var(--ink-2)}
.group-row{display:grid;grid-template-columns:minmax(220px,1.5fr) minmax(160px,1fr) 130px 140px;gap:18px;align-items:center;width:100%;padding:14px 18px;border:0;border-top:1px solid var(--line);background:#fff;text-align:left;cursor:pointer}
.group-row:hover{background:#f8fbfc}
.group-row strong{font-weight:500}
.group-row span{color:var(--ink-2)}
.inline-detail{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(280px,.7fr);gap:24px;padding:24px;background:#f8fbfc;border-top:1px solid var(--line)}
.inline-detail h3{margin:0 0 5px;font-size:19px;font-weight:500}
.inline-detail p{margin:0;color:var(--ink-2)}
.inline-action{padding:18px;background:#fff;border-radius:var(--radius);box-shadow:0 2px 7px rgba(0,0,0,.07)}
.inline-action strong{display:block;margin-bottom:5px;font-weight:500}
.inline-action p{margin-bottom:14px;font-size:12px}
.drawer-backdrop{position:fixed;inset:0;background:rgba(7,31,55,.28);z-index:20}
.drawer{position:fixed;z-index:21;top:0;right:0;width:min(520px,100%);height:100vh;padding:24px;background:#fff;box-shadow:-8px 0 18px rgba(0,0,0,.18);overflow:auto}
.drawer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px}
.drawer-head h2{margin:0 0 4px;font-size:23px;font-weight:500}
.drawer-head p{margin:0;color:var(--ink-2)}
.icon-btn{width:40px;height:40px;border:1px solid var(--line-strong);border-radius:var(--radius);background:#fff;cursor:pointer;font-size:20px;line-height:1}
.drawer-section{padding:18px 0;border-top:1px solid var(--line)}
.drawer-section h3{margin:0 0 12px;font-size:15px;font-weight:500}
.drawer-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px}
.prototype-bar{position:fixed;z-index:30;left:50%;bottom:18px;transform:translateX(-50%);display:flex;align-items:center;gap:8px;padding:6px;border-radius:999px;background:var(--navy);color:#fff;box-shadow:var(--shadow)}
.prototype-bar button{width:40px;height:40px;border:0;border-radius:50%;background:#173b55;color:#fff;cursor:pointer;font-size:18px}
.prototype-bar button:hover{background:#20506e}
.published .prototype-bar,.published .screen-switch{display:none}
.prototype-label{min-width:190px;text-align:center}
.prototype-label strong{display:block;font-weight:500}
.prototype-label span{display:block;color:#a9bdcc;font-size:10px}
.toast{position:fixed;z-index:40;right:22px;bottom:22px;padding:12px 16px;border-radius:var(--radius);background:var(--navy);color:#fff;box-shadow:var(--shadow)}
.empty{padding:56px 20px;text-align:center;color:var(--ink-2)}
[hidden]{display:none!important}
@media(max-width:1100px){
  .head-copy{grid-column:1 / span 8}
  .screen-switch{grid-column:9 / -1}
  .data-table th:nth-child(5),.data-table td:nth-child(5){display:none}
  .group-row{grid-template-columns:minmax(210px,1.5fr) minmax(150px,1fr) 120px}
  .group-row>*:nth-child(4){display:none}
}
@media(max-width:900px){
  .app{display:block}
  .sidebar{position:static;width:100%;height:auto;padding:14px 16px}
  .brand{padding:0}
  .sidebar-search,.workspace-label,.sidebar-bottom{display:none}
  .nav{display:flex;gap:4px;margin-top:12px;overflow-x:auto}
  .nav a{flex:0 0 auto}
  .nav-copy span{display:none}
  .content{padding:24px 16px 100px}
  .page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .head-copy h1{font-size:26px}
  .screen-switch{justify-self:auto}
  .summary-strip{overflow-x:auto}
  .summary-item:first-child{flex:0 0 220px}
  .master-grid{grid-template-columns:1fr}
  .queue-pane{max-height:360px;overflow:auto}
  .inline-detail{grid-template-columns:1fr}
}
@media(max-width:700px){
  .page-head{display:grid;grid-template-columns:1fr}
  .content-inner,.page-head,.head-copy{min-width:0;width:100%;max-width:100%}
  .head-copy,.screen-switch{grid-column:1}
  .head-copy p{width:100%;max-width:100%;white-space:normal;overflow-wrap:anywhere}
  .screen-switch{width:100%;justify-self:stretch}
  .screen-switch button{flex:1}
  .summary-strip{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));overflow:visible}
  .summary-item:first-child{flex:auto}
  .toolbar{align-items:stretch;flex-direction:column}
  .searchbox{max-width:none}
  .filters{width:100%}
  .table-shell{overflow-x:auto}
  .data-table{min-width:720px}
  .data-table th:nth-child(5),.data-table td:nth-child(5){display:table-cell}
  .record-head{display:grid}
  .record-actions{justify-content:flex-start}
  .facts{grid-template-columns:1fr}
  .group-row{grid-template-columns:minmax(180px,1fr) auto}
  .group-row>*:nth-child(2),.group-row>*:nth-child(4){display:none}
  .prototype-label{min-width:150px}
}
@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
</style>
</head>

let state={screen:isPublished?(params.get('screen')==='agencies'||params.get('screen')==='commissions'?params.get('screen'):pathScreen):(params.get('screen')==='agencies'?'agencies':'commissions'),variant:isPublished?(params.get('view')==='all'?'A':'B'):(['A','B','C'].includes(params.get('variant'))?params.get('variant'):'A'),selectedCommission:params.get('record')||'RES-10491',selectedAgency:params.get('agency')||'host-a',filter:'all',query:''};
/* DEV WIRING MAP: replace these artifact paths with live routes when the app router is connected. */
const NAV_WIRES=Object.freeze({home:'dashboard/index.html',commissions:'dashboard/commissions.html',agencies:'dashboard/agencies.html',commissionDetail:'dashboard/codex-20260707-commission-detail-resolution.html',agencyRequest:'dashboard/agencies.html?agency=host-a',commissionQueue:'dashboard/commissions.html?view=issues'});
const surface=document.getElementById('surface');
const overlay=document.getElementById('overlay');
const toast=document.querySelector('.toast');
const status=(label,kind)=>`<span class="status ${kind}">${label}</span>`;
function pageHeader(title,copy){return `<header class="page-head"><div class="head-copy"><h1>${title}</h1><p>${copy}</p></div><div class="screen-switch" role="group" aria-label="Prototype page"><button type="button" data-screen="commissions" aria-pressed="${state.screen==='commissions'}">Commissions</button><button type="button" data-screen="agencies" aria-pressed="${state.screen==='agencies'}">Agencies</button></div></header>`}
function commissionSummary(){return `<div class="summary-strip"><div class="summary-item"><span>Open commission value</span><strong>EUR 6,189</strong></div><div class="summary-item"><span>Issues to fix</span><strong><em>2</em></strong></div><div class="summary-item"><span>Waiting on agency</span><strong>14</strong></div><div class="summary-item"><span>Ready for approval</span><strong>1</strong></div></div>`}
function agencySummary(){return `<div class="summary-strip"><div class="summary-item"><span>Agency relationships</span><strong>4</strong></div><div class="summary-item"><span>Onboarded</span><strong><em>1</em></strong></div><div class="summary-item"><span>Waiting</span><strong>1</strong></div><div class="summary-item"><span>Need hotel action</span><strong>2</strong></div></div>`}
function toolbar(type){
  const filters=type==='commissions'?[['all','All'],['review','Needs review'],['wait','Waiting'],['ready','Ready']]:[['all','All'],['review','Hotel action'],['wait','Waiting'],['ready','Onboarded']];
  return `<div class="toolbar"><label class="searchbox"><span hidden>Search ${type}</span><input type="search" data-search placeholder="Search ${type}, references, or owners" value="${state.query}"></label><div class="filters" role="group" aria-label="${type} filters">${filters.map(([key,label])=>`<button class="filter" type="button" data-filter="${key}" aria-pressed="${state.filter===key}">${label}</button>`).join('')}</div></div>`;
}
function workbenchSearch(type){return `<div class="pane-tools"><label class="searchbox"><span hidden>Search ${type}</span><input type="search" data-search placeholder="Search ${type}, references, or owners" value="${state.query}"></label></div>`}
function filtered(rows){return rows.filter(row=>(state.filter==='all'||row.kind===state.filter)&&(!state.query||JSON.stringify(row).toLowerCase().includes(state.query.toLowerCase())))}
function commissionsTable(){
  const rows=filtered(commissionRows);
  if(!rows.length)return `<div class="table-shell empty">No commissions match this view.</div>`;
  return `<div class="table-shell"><table class="data-table"><thead><tr><th style="width:28%">Commission</th><th style="width:17%">Status</th><th style="width:13%">Owner</th><th style="width:13%">Amount</th><th style="width:12%">Source</th><th>Next action</th></tr></thead><tbody>${rows.map(row=>`<tr tabindex="0" data-commission="${row.id}" aria-selected="${state.selectedCommission===row.id}"><td class="name-cell"><strong>${row.agency}</strong><span>${row.id} - ${row.stay}</span></td><td>${status(row.state,row.kind)}</td><td class="owner">${row.owner}</td><td class="amount">${row.amount}</td><td class="mono">${row.source}</td><td><span class="row-action">${row.next} &#8594;</span></td></tr>`).join('')}</tbody></table></div>`;
}
function agenciesTable(){
  const rows=filtered(agencyRows);
  if(!rows.length)return `<div class="table-shell empty">No agencies match this view.</div>`;
  return `<div class="table-shell"><table class="data-table"><thead><tr><th style="width:27%">Agency</th><th style="width:17%">Readiness</th><th style="width:18%">Contact</th><th style="width:11%">Open</th><th style="width:13%">Matched</th><th>Next action</th></tr></thead><tbody>${rows.map(row=>`<tr tabindex="0" data-agency="${row.id}" aria-selected="${state.selectedAgency===row.id}"><td class="name-cell"><strong>${row.name}</strong><span>${row.type} - ${row.iata}</span></td><td>${status(row.state,row.kind)}</td><td class="owner">${row.contact}</td><td class="mono">${row.open}</td><td class="amount">${row.value}</td><td><span class="row-action">${row.next} &#8594;</span></td></tr>`).join('')}</tbody></table></div>`;
}
function commissionWork(row){const detailControl=isPublished?`<a class="btn" href="codex-20260707-commission-detail-resolution.html" data-wire="commission-detail">Open full record</a>`:`<button class="btn" type="button" data-action="Open full record">Open full record</button>`;return `<div class="work-body"><div class="record-head"><div><h2>${row.agency}</h2><p class="mono">${row.id} - ${row.amount} - ${row.source}</p></div><div class="record-actions">${status(row.state,row.kind)}${detailControl}</div></div><section class="decision"><h3>${row.detail}</h3><p>${row.secondary}</p>${row.kind==='review'?`<div class="choice-row"><button class="choice" type="button" aria-pressed="true"><strong>EUR 288</strong><span>Imported rate</span></button><button class="choice" type="button" aria-pressed="false"><strong>EUR 250</strong><span>Agency value</span></button></div>`:`<button class="btn primary" type="button" data-action="${row.next}" data-wire="commission-action">${row.next}</button>`}</section><div class="facts"><div class="fact"><span>Stay</span><strong>${row.stay}</strong></div><div class="fact"><span>Next owner</span><strong>${row.owner}</strong></div><div class="fact"><span>Source</span><strong>${row.source}</strong></div><div class="fact"><span>Approval</span><strong>${row.kind==='ready'?'Available after review':'Not yet available'}</strong></div></div><div class="drawer-actions">${row.kind==='review'?`<button class="btn primary" type="button" data-action="Save resolution" data-wire="commission-resolution">Save resolution</button><button class="btn danger" type="button" data-action="Escalate issue" data-wire="commission-escalation">Escalate</button>`:''}</div></div>`}
function agencyWork(row){const agencyControl=isPublished?`<a class="btn" href="commissions.html?view=all&amp;agency=${encodeURIComponent(row.id)}" data-wire="agency-to-commissions">Open commissions</a>`:`<button class="btn" type="button" data-action="Open agency profile">Open full profile</button>`;return `<div class="work-body"><div class="record-head"><div><h2>${row.name}</h2><p>${row.type} - ${row.iata}</p></div><div class="record-actions">${status(row.state,row.kind)}${agencyControl}</div></div><div class="tabs" role="tablist"><button class="tab" type="button" aria-pressed="true">Overview</button><button class="tab" type="button" aria-pressed="false">Commissions</button><button class="tab" type="button" aria-pressed="false">Activity</button></div><section class="decision"><h3>${row.detail}</h3><p>${row.secondary}</p><button class="btn primary" type="button" data-action="${row.next}" data-wire="agency-action">${row.next}</button></section><div class="facts"><div class="fact"><span>Primary contact</span><strong>${row.contact}</strong></div><div class="fact"><span>Open commissions</span><strong>${row.open}</strong></div><div class="fact"><span>Matched value</span><strong>${row.value}</strong></div><div class="fact"><span>Relationship</span><strong>${row.type}</strong></div></div></div>`}
function queue(items,type){return `<div class="queue-list">${items.length?items.map(row=>`<button class="queue-row" type="button" data-${type}="${row.id}" aria-pressed="${type==='commission'?state.selectedCommission===row.id:state.selectedAgency===row.id}"><strong><span>${type==='commission'?row.agency:row.name}</span><span class="mono">${type==='commission'?row.amount:row.open}</span></strong><span>${row.detail}</span><small>${type==='commission'?row.id:row.type} - ${row.state}</small></button>`).join(''):`<div class="empty">No matching records.</div>`}</div>`}
function commissionsA(){return `${pageHeader('Commissions','Find the records that need a decision, then move eligible work forward.')}${commissionSummary()}${toolbar('commissions')}${isPublished?'<a class="btn" href="commissions.html?view=issues" data-wire="all-to-issues">Issues to fix</a>':''}${commissionsTable()}`}
function agenciesA(){return `${pageHeader('Agencies','See which relationships are ready and who needs a clear request next.')}${agencySummary()}${toolbar('agencies')}${agenciesTable()}`}
function commissionsB(){const row=commissionRows.find(item=>item.id===state.selectedCommission)||commissionRows[0];const rows=filtered(commissionRows);return `${pageHeader('Commissions','Resolve issues without losing the wider queue.')}${commissionSummary()}<div class="master-grid"><section class="queue-pane"><header class="pane-head"><div><h2>Issues to fix</h2><p>Ordered by hotel impact</p></div><span class="group-count">${rows.length}</span></header>${workbenchSearch('commissions')}<a class="btn" href="${isPublished?'commissions.html?view=all':'?screen=commissions&variant=A'}" data-wire="issues-to-all">All commissions</a>${queue(rows,'commission')}</section><section class="work-pane">${commissionWork(row)}</section></div>`}
function agenciesB(){const row=agencyRows.find(item=>item.id===state.selectedAgency)||agencyRows[0];const rows=filtered(agencyRows);return `${pageHeader('Agencies','Move between relationships and act on the selected agency.')}${agencySummary()}<div class="master-grid"><section class="queue-pane"><header class="pane-head"><div><h2>Agencies</h2><p>Ordered by next action</p></div><span class="group-count">${rows.length}</span></header>${workbenchSearch('agencies')}${queue(rows,'agency')}</section><section class="work-pane">${agencyWork(row)}</section></div>`}
function commissionGroup(title,copy,kind){const rows=commissionRows.filter(row=>row.kind===kind);return `<section class="action-group"><header class="group-head"><div><h2>${title}</h2><p>${copy}</p></div><span class="group-count">${rows.length}</span></header>${rows.map(row=>`<button class="group-row" type="button" data-inline-commission="${row.id}"><strong>${row.agency}<small class="mono" style="display:block;color:var(--ink-3);font-weight:400">${row.id}</small></strong><span>${row.detail}</span><span class="amount">${row.amount}</span><span class="row-action">${row.next} &#8594;</span></button>${state.selectedCommission===row.id?`<div class="inline-detail"><div><h3>${row.detail}</h3><p>${row.secondary}</p></div><div class="inline-action"><strong>${row.next}</strong><p>Owner: ${row.owner}</p><button class="btn primary" type="button" data-action="${row.next}">${row.next}</button></div></div>`:''}`).join('')}</section>`}
function agencyGroup(title,copy,kinds){const rows=agencyRows.filter(row=>kinds.includes(row.kind));return `<section class="action-group"><header class="group-head"><div><h2>${title}</h2><p>${copy}</p></div><span class="group-count">${rows.length}</span></header>${rows.map(row=>`<button class="group-row" type="button" data-inline-agency="${row.id}"><strong>${row.name}<small style="display:block;color:var(--ink-3);font-weight:400">${row.type}</small></strong><span>${row.detail}</span><span class="amount">${row.value}</span><span class="row-action">${row.next} &#8594;</span></button>${state.selectedAgency===row.id?`<div class="inline-detail"><div><h3>${row.detail}</h3><p>${row.secondary}</p></div><div class="inline-action"><strong>${row.next}</strong><p>${row.contact}</p><button class="btn primary" type="button" data-action="${row.next}">${row.next}</button></div></div>`:''}`).join('')}</section>`}
function commissionsC(){return `${pageHeader('Commissions by next action','Work from responsibility and urgency instead of scanning every status equally.')}${commissionSummary()}<div class="action-groups">${commissionGroup('Hotel action','Decisions that change today\'s commission work.','review')}${commissionGroup('Waiting on agency','Requests already sent; follow up only when needed.','wait')}${commissionGroup('Ready to move','Verified records with a defined next step.','ready')}${commissionGroup('Invoice work','Records ready for the hotel invoice flow.','info')}</div>`}
function agenciesC(){return `${pageHeader('Agency actions','Organize relationships around the work required to move commissions.')}${agencySummary()}<div class="action-groups">${agencyGroup('Hotel action','A contact, relationship, or invoice route needs a hotel decision.',['review','info'])}${agencyGroup('Waiting on agency','A clear request has been sent.',['wait'])}${agencyGroup('Ready','Relationship and operational contact are confirmed.',['ready'])}</div>`}
function render(){
  overlay.innerHTML='';
  const fn=state.screen==='commissions'?{A:commissionsA,B:commissionsB,C:commissionsC}[state.variant]:{A:agenciesA,B:agenciesB,C:agenciesC}[state.variant];
  surface.innerHTML=fn();
  document.querySelectorAll('[data-nav]').forEach(link=>link.setAttribute('aria-current',link.dataset.nav===state.screen?'page':'false'));
  document.querySelector('[data-variant-name]').textContent=variants[state.variant];
  bind();
  const next=new URL(location.href);next.searchParams.set('screen',state.screen);if(isPublished){next.searchParams.set('view',state.variant==='A'?'all':'issues');next.searchParams.delete('variant')}else next.searchParams.set('variant',state.variant);history.replaceState({},'',next);
}
function bind(){
  document.querySelectorAll('[data-screen]').forEach(button=>button.addEventListener('click',()=>{state.screen=button.dataset.screen;state.filter='all';state.query='';render()}));
  document.querySelectorAll('[data-filter]').forEach(button=>button.addEventListener('click',()=>{state.filter=button.dataset.filter;render()}));
  const search=document.querySelector('[data-search]');if(search)search.addEventListener('input',event=>{const caret=event.target.selectionStart??event.target.value.length;state.query=event.target.value;render();const nextInput=document.querySelector('[data-search]');if(nextInput){nextInput.focus();const nextCaret=Math.min(caret,nextInput.value.length);nextInput.setSelectionRange(nextCaret,nextCaret)}});
  document.querySelectorAll('tr[data-commission]').forEach(row=>row.addEventListener('click',()=>{state.selectedCommission=row.dataset.commission;openCommission(row.dataset.commission)}));
  document.querySelectorAll('tr[data-agency]').forEach(row=>row.addEventListener('click',()=>{state.selectedAgency=row.dataset.agency;openAgency(row.dataset.agency)}));
  document.querySelectorAll('.queue-row[data-commission]').forEach(row=>row.addEventListener('click',()=>{state.selectedCommission=row.dataset.commission;render()}));
  document.querySelectorAll('.queue-row[data-agency]').forEach(row=>row.addEventListener('click',()=>{state.selectedAgency=row.dataset.agency;render()}));
  document.querySelectorAll('[data-inline-commission]').forEach(row=>row.addEventListener('click',()=>{state.selectedCommission=state.selectedCommission===row.dataset.inlineCommission?'':row.dataset.inlineCommission;render()}));
  document.querySelectorAll('[data-inline-agency]').forEach(row=>row.addEventListener('click',()=>{state.selectedAgency=state.selectedAgency===row.dataset.inlineAgency?'':row.dataset.inlineAgency;render()}));
  document.querySelectorAll('[data-action]').forEach(button=>button.addEventListener('click',()=>showToast(button.dataset.action)));
  document.querySelectorAll('.choice').forEach(choice=>choice.addEventListener('click',()=>{document.querySelectorAll('.choice').forEach(node=>node.setAttribute('aria-pressed',String(node===choice)))}));
  document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(node=>node.setAttribute('aria-pressed',String(node===tab)))}));
  document.querySelectorAll('tr[data-commission],tr[data-agency]').forEach(row=>row.addEventListener('keydown',event=>{if(event.key==='Enter'||event.key===' '){event.preventDefault();row.click()}}));
}
function openCommission(id){const row=commissionRows.find(item=>item.id===id);overlay.innerHTML=`<div class="drawer-backdrop" data-close></div><aside class="drawer" tabindex="-1" aria-labelledby="drawer-title"><div class="drawer-head"><div><h2 id="drawer-title">${row.agency}</h2><p class="mono">${row.id} - ${row.amount}</p></div><button class="icon-btn" type="button" data-close aria-label="Close details">&#215;</button></div>${commissionWork(row)}</aside>`;bindOverlay()}
function openAgency(id){const row=agencyRows.find(item=>item.id===id);overlay.innerHTML=`<div class="drawer-backdrop" data-close></div><aside class="drawer" tabindex="-1" aria-labelledby="drawer-title"><div class="drawer-head"><div><h2 id="drawer-title">${row.name}</h2><p>${row.type}</p></div><button class="icon-btn" type="button" data-close aria-label="Close details">&#215;</button></div>${agencyWork(row)}</aside>`;bindOverlay()}
function bindOverlay(){overlay.querySelectorAll('[data-close]').forEach(node=>node.addEventListener('click',()=>overlay.innerHTML=''));overlay.querySelectorAll('[data-action]').forEach(button=>button.addEventListener('click',()=>showToast(button.dataset.action)));overlay.querySelectorAll('.choice').forEach(choice=>choice.addEventListener('click',()=>{overlay.querySelectorAll('.choice').forEach(node=>node.setAttribute('aria-pressed',String(node===choice)))}));overlay.querySelector('.drawer')?.focus()}
function showToast(message){toast.textContent=message;toast.hidden=false;clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>toast.hidden=true,1800)}
function cycle(direction){const keys=['A','B','C'];state.variant=keys[(keys.indexOf(state.variant)+direction+keys.length)%keys.length];render()}
document.querySelector('[data-previous]').addEventListener('click',()=>cycle(-1));
document.querySelector('[data-next]').addEventListener('click',()=>cycle(1));
document.querySelector('.sidebar-search').addEventListener('click',()=>{const input=document.querySelector('[data-search]');if(input)input.focus();else showToast('Search is available in list views')});
document.addEventListener('keydown',event=>{if((event.metaKey||event.ctrlKey)&&event.key.toLowerCase()==='k'){event.preventDefault();const input=document.querySelector('[data-search]');if(input)input.focus();return}if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)||document.activeElement?.isContentEditable)return;if(event.key==='ArrowLeft')cycle(-1);if(event.key==='ArrowRight')cycle(1);if(event.key==='Escape')overlay.innerHTML=''});
render();
</script>
</body>
</html>
