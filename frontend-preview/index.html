<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Volta interactive frontend preview</title>
<style>
/* Source: docs/design/VOLTA_DESIGN_TOKENS.md */
:root{
  --white:#fff;
  --canvas:#f0f7f9;
  --canvas-2:#f5f8fa;
  --surface:#fff;
  --surface-2:#e2edf0;
  --surface-3:#d0dfe5;
  --ink:#091d36;
  --ink-2:#3a4f65;
  --ink-3:#697d8e;
  --line:#d0dfe5;
  --line-strong:#a3b4bf;
  --accent:#59cdc6;
  --accent-strong:#0a7975;
  --accent-soft:#e3f8f7;
  --success:#007d50;
  --success-soft:#e8f5ef;
  --warning:#a36e09;
  --warning-soft:#fff6e5;
  --error:#ac312a;
  --error-soft:#fff0ef;
  --info:#06658e;
  --info-soft:#edf5fa;
  --shadow-panel:0 1px 2px rgb(9 29 54 / .06),0 6px 14px rgb(9 29 54 / .04);
  --focus-ring:0 0 0 3px var(--accent-soft),0 0 0 5px var(--accent);
  --radius:6px;
  --control-radius:4px;
  --pill:999px;
  --font:Manrope,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --mono:"DM Mono",ui-monospace,Menlo,Consolas,monospace;
  --grid-columns:12;
  --grid-gutter:24px;
  --grid-margin:32px;
  --grid-max:1360px;
  --baseline:8px;
  --ease:160ms ease-out;
}
*{box-sizing:border-box}
html{background:var(--canvas);color:var(--ink)}
body{margin:0;background:var(--canvas);font:14px/1.5 var(--font);font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}
button,input{font:inherit}
button{color:inherit}
a{color:inherit}
button:focus-visible,a:focus-visible,input:focus-visible{outline:0;box-shadow:var(--focus-ring)}
.skip-link{position:fixed;left:16px;top:-60px;z-index:30;padding:10px 14px;border-radius:var(--control-radius);background:var(--ink);color:var(--white)}
.skip-link:focus{top:16px}
.app-shell{min-height:100vh;display:grid;grid-template-columns:240px minmax(0,1fr)}
.sidebar{position:sticky;top:0;height:100dvh;display:flex;flex-direction:column;gap:24px;padding:24px 16px 18px;background:var(--white);border-right:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-mark{display:grid;width:34px;height:34px;place-items:center;border-radius:var(--radius);background:var(--ink)}
.brand-mark img{width:28px;height:28px}
.brand-copy strong,.brand-copy span{display:block}
.brand-copy strong{font-size:15px;font-weight:600}
.brand-copy span{margin-top:1px;color:var(--ink-3);font-size:11px}
.sidebar-section{display:grid;gap:8px}
.sidebar-label{margin:0 10px;color:var(--ink-3);font-size:11px;font-weight:500}
.nav{display:grid;gap:2px}
.nav-item{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:8px;width:100%;padding:9px 10px;border:0;border-radius:var(--control-radius);background:transparent;color:var(--ink-2);text-align:left;cursor:pointer}
.nav-item:hover{background:var(--surface-2);color:var(--ink)}
.nav-item[aria-current="page"]{background:var(--accent-soft);color:var(--ink)}
.nav-copy strong,.nav-copy span{display:block}
.nav-copy strong{font-size:13px;font-weight:500}
.nav-copy span{margin-top:1px;color:var(--ink-3);font-size:10px}
.nav-count{min-width:20px;padding:2px 6px;border-radius:var(--pill);background:var(--surface-2);font:500 10px/1.4 var(--mono);text-align:center}
.nav-item[aria-current="page"] .nav-count{background:var(--accent);color:var(--ink)}
.sidebar-footer{display:grid;gap:12px;margin-top:auto}
.setup-link{display:block;padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--canvas-2);text-decoration:none}
.setup-link:hover{border-color:var(--line-strong);background:var(--accent-soft)}
.setup-link span,.profile span{display:block;color:var(--ink-3);font-size:11px}
.setup-link strong{display:block;margin-top:4px;font-size:13px;font-weight:500}
.profile{display:grid;grid-template-columns:30px minmax(0,1fr);gap:9px;align-items:center}
.avatar{display:grid;width:30px;height:30px;place-items:center;border-radius:var(--control-radius);background:var(--surface-2);font:500 10px/1 var(--mono)}
.profile strong{font-size:12px;font-weight:500}
.main{min-width:0;background:var(--canvas-2)}
.page{width:min(100%,var(--grid-max));margin:0 auto;padding:32px var(--grid-margin) 56px}
.page-head{display:flex;justify-content:space-between;gap:24px;align-items:flex-start;margin-bottom:28px}
.page-head h1{margin:0;font-size:32px;line-height:1.15;font-weight:500;letter-spacing:0;text-wrap:balance}
.page-head p{max-width:68ch;margin:8px 0 0;color:var(--ink-2)}
.head-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.property{color:var(--ink-3);font-size:12px}
.utility-btn,.btn{display:inline-flex;min-height:36px;align-items:center;justify-content:center;border:1px solid var(--line-strong);border-radius:var(--control-radius);background:var(--white);padding:8px 12px;color:var(--ink);font-weight:500;text-decoration:none;white-space:nowrap;cursor:pointer;transition:background var(--ease),border-color var(--ease),color var(--ease)}
.utility-btn:hover,.btn:hover{border-color:var(--ink-2);background:var(--surface-2)}
.btn.primary{border-color:var(--accent-strong);background:var(--accent-strong);color:var(--white)}
.btn.primary:hover{background:var(--ink);border-color:var(--ink)}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.btn.ghost{border-color:transparent;background:transparent;color:var(--ink-2)}
.btn.ghost:hover{border-color:var(--line);background:var(--white);color:var(--ink)}
.summary-band{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:28px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-panel)}
.summary-item{display:block;min-width:0;padding:16px 18px;text-align:left;text-decoration:none}
.summary-item+.summary-item{border-left:1px solid var(--line)}
.summary-item:hover{background:var(--accent-soft)}
.summary-item span,.summary-item small{display:block;color:var(--ink-3);font-size:11px}
.summary-item strong{display:block;margin:4px 0;font:500 24px/1.1 var(--mono)}
.summary-item small{color:var(--ink-2)}
.summary-item[data-tone="warning"] strong{color:var(--warning)}
.summary-item[data-tone="error"] strong{color:var(--error)}
.summary-item[data-tone="success"] strong{color:var(--success)}
.focus-grid{display:grid;grid-template-columns:minmax(0,7fr) minmax(320px,5fr);gap:var(--grid-gutter);margin-bottom:32px}
.report-panel{min-width:0;padding:24px;border-radius:var(--radius);background:var(--ink);color:var(--white)}
.report-panel .eyeline{color:var(--accent)}
.eyeline{margin:0 0 6px;color:var(--ink-3);font-size:12px}
.report-panel h2{max-width:26ch;margin:0;font-size:24px;line-height:1.2;font-weight:500;text-wrap:balance}
.report-panel p{max-width:62ch;margin:12px 0 20px;color:#dce8ef}
.report-actions{display:flex;gap:8px;flex-wrap:wrap}
.report-panel .btn{border-color:rgb(255 255 255 / .34);background:transparent;color:var(--white)}
.report-panel .btn:hover{border-color:var(--accent);background:rgb(89 205 198 / .16)}
.report-panel .btn.primary{border-color:var(--accent);background:var(--accent);color:var(--ink)}
.action-panel{min-width:0;padding:20px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-panel)}
.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}
.section-head h2{margin:0;font-size:17px;line-height:1.3;font-weight:600}
.section-head p{margin:3px 0 0;color:var(--ink-2);font-size:12px}
.section-head a{color:var(--accent-strong);font-size:12px;font-weight:500}
.action-list,.activity-list,.needs-list{display:grid}
.action-row{display:grid;grid-template-columns:8px minmax(0,1fr) auto;gap:10px;align-items:start;padding:12px 0;border-top:1px solid var(--line)}
.action-row:first-child{border-top:0;padding-top:0}
.action-row:last-child{padding-bottom:0}
.status-dot{width:8px;height:8px;margin-top:6px;border-radius:50%;background:var(--info)}
.status-dot.error{background:var(--error)}
.status-dot.warning{background:var(--warning)}
.status-dot.success{background:var(--success)}
.action-row strong{display:block;font-size:13px;font-weight:600}
.action-row span{display:block;margin-top:3px;color:var(--ink-2);font-size:12px}
.action-row .amount{font:500 12px/1.4 var(--mono);white-space:nowrap}
.pipeline{margin-bottom:32px;padding:20px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-panel)}
.pipeline-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:24px}
.pipeline-stat{min-width:0;padding:12px;border-radius:var(--control-radius);background:var(--canvas)}
.pipeline-stat span{display:block;color:var(--ink-3);font-size:11px}
.pipeline-stat strong{display:block;margin-top:4px;font:500 20px/1.1 var(--mono)}
.pipeline-stat small{display:block;margin-top:4px;color:var(--ink-2);font-size:11px}
.timeline{position:relative;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;padding-top:4px}
.timeline:before{content:"";position:absolute;left:5%;right:5%;top:9px;height:1px;background:var(--line-strong)}
.timeline-step{position:relative;z-index:1;display:grid;gap:5px;justify-items:center;text-align:center}
.timeline-dot{width:11px;height:11px;border:1px solid var(--line-strong);border-radius:50%;background:var(--canvas)}
.timeline-step:first-child .timeline-dot,.timeline-step:last-child .timeline-dot{border-color:var(--accent);background:var(--accent)}
.timeline-step span{color:var(--ink-3);font:400 10px/1.25 var(--mono)}
.timeline-step strong{font:500 12px/1.2 var(--mono)}
.content-grid{display:grid;grid-template-columns:minmax(0,7fr) minmax(300px,5fr);gap:var(--grid-gutter)}
.section-surface{min-width:0;padding:20px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-panel)}
.needs-row{display:grid;grid-template-columns:8px minmax(0,1fr) auto;gap:12px;align-items:center;padding:14px 0;border-top:1px solid var(--line)}
.needs-row:first-child{border-top:0;padding-top:0}
.needs-row:last-child{padding-bottom:0}
.needs-copy strong{display:block;font-size:13px;font-weight:600}
.needs-copy span{display:block;margin-top:3px;color:var(--ink-2);font-size:12px}
.needs-copy small{display:block;margin-top:4px;color:var(--ink-3);font:400 10px/1.3 var(--mono)}
.row-action{min-height:34px;padding:7px 10px}
.activity-row{display:grid;grid-template-columns:10px minmax(0,1fr) auto;gap:10px;align-items:center;padding:12px 0;border-top:1px solid var(--line)}
.activity-row:first-child{border-top:0;padding-top:0}
.activity-marker{width:8px;height:8px;border-radius:50%;background:var(--accent-strong)}
.activity-row strong{font-size:12px;font-weight:500}
.activity-row span{display:block;margin-top:2px;color:var(--ink-2);font-size:11px}
.activity-row time{color:var(--ink-3);font:400 10px/1.4 var(--mono);white-space:nowrap}
.workbench{display:grid;grid-template-columns:minmax(280px,5fr) minmax(0,7fr);gap:var(--grid-gutter);align-items:start}
.queue-pane,.work-pane{min-width:0;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-panel)}
.queue-pane{overflow:hidden}
.queue-head,.work-head{padding:20px}
.queue-head{background:var(--canvas)}
.queue-head h2,.work-head h2{margin:0;font-size:17px;font-weight:600}
.queue-head p,.work-head p{margin:4px 0 0;color:var(--ink-2);font-size:12px}
.search-control{position:relative;margin-top:16px}
.search-control input{width:100%;min-height:38px;padding:9px 36px 9px 11px;border:1px solid var(--line-strong);border-radius:var(--control-radius);background:var(--white);color:var(--ink)}
.search-control input::placeholder{color:var(--ink-3)}
.search-clear{position:absolute;right:6px;top:5px;min-width:28px;min-height:28px;border:0;border-radius:var(--control-radius);background:transparent;color:var(--ink-3);cursor:pointer}
.search-clear:hover{background:var(--surface-2);color:var(--ink)}
.tabs{display:flex;gap:16px;overflow:auto;margin-top:16px;border-bottom:1px solid var(--line)}
.tab{position:relative;padding:8px 0 10px;border:0;background:transparent;color:var(--ink-2);font-size:12px;white-space:nowrap;cursor:pointer}
.tab[aria-selected="true"]{color:var(--ink);font-weight:500}
.tab[aria-selected="true"]:after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--accent-strong)}
.record-list{display:grid}
.record-row{display:grid;grid-template-columns:8px minmax(0,1fr) auto;gap:10px;align-items:start;padding:14px 16px;border-top:1px solid var(--line);background:var(--surface);text-align:left;cursor:pointer}
.record-row:hover{background:var(--canvas)}
.record-row[aria-selected="true"]{background:var(--accent-soft)}
.record-row strong{display:block;font-size:13px;font-weight:600}
.record-row span{display:block;margin-top:3px;color:var(--ink-2);font-size:11px}
.record-row small{display:block;margin-top:4px;color:var(--ink-3);font:400 10px/1.3 var(--mono)}
.record-row .amount{font:500 12px/1.4 var(--mono);white-space:nowrap}
.status-chip{display:inline-flex;align-items:center;gap:5px;width:max-content;padding:3px 7px;border:1px solid transparent;border-radius:var(--pill);font-size:10px;line-height:1.2}
.status-chip:before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.status-chip.error{border-color:#edc4c8;background:var(--error-soft);color:var(--error)}
.status-chip.warning{border-color:#f0d7a8;background:var(--warning-soft);color:var(--warning)}
.status-chip.success{border-color:#b9ddce;background:var(--success-soft);color:var(--success)}
.status-chip.info{border-color:#c5dbe8;background:var(--info-soft);color:var(--info)}
.work-pane{overflow:hidden}
.work-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;background:var(--canvas)}
.work-head-copy{min-width:0}
.work-head .status-chip{margin-top:10px}
.work-body{padding:20px}
.fact-band{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:24px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.fact{min-width:0;padding:14px 12px}
.fact+.fact{border-left:1px solid var(--line)}
.fact span{display:block;color:var(--ink-3);font-size:11px}
.fact strong{display:block;margin-top:5px;font:500 18px/1.15 var(--mono);overflow-wrap:anywhere}
.fact small{display:block;margin-top:4px;color:var(--ink-2);font-size:11px}
.decision-row{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:24px;padding:14px;border-radius:var(--control-radius);background:var(--accent-soft)}
.decision-row strong{font-size:13px;font-weight:600}
.decision-row span{display:block;margin-top:3px;color:var(--ink-2);font-size:11px}
.decision-row .btn{flex:0 0 auto}
.source-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.source-grid div{min-width:0;padding:13px;border-top:1px solid var(--line);background:var(--surface)}
.source-grid div:nth-child(-n+2){border-top:0;background:var(--surface-2);color:var(--ink-3);font:500 10px/1.25 var(--mono)}
.source-grid div:nth-child(2n){border-left:1px solid var(--line)}
.source-grid strong{display:block;font-size:13px;font-weight:500;color:var(--ink)}
.source-grid span{display:block;margin-top:4px;color:var(--ink-2);font-size:11px}
.support-list{display:grid;gap:0;margin-top:24px}
.support-row{display:grid;grid-template-columns:8px minmax(0,1fr) auto;gap:10px;align-items:start;padding:12px 0;border-top:1px solid var(--line)}
.support-row strong{display:block;font-size:12px;font-weight:500}
.support-row span{display:block;margin-top:3px;color:var(--ink-2);font-size:11px}
.support-row .state{font-size:11px;font-weight:500;white-space:nowrap}
.empty{padding:24px 16px;color:var(--ink-2);text-align:center}
.empty strong{display:block;color:var(--ink);font-size:13px;font-weight:500}
.empty p{margin:5px auto 14px;max-width:36ch;font-size:12px}
.detail-layout{display:grid;grid-template-columns:minmax(260px,4fr) minmax(0,8fr);gap:var(--grid-gutter);align-items:start}
.identity-panel,.decision-panel{min-width:0;padding:20px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-panel)}
.identity-panel{background:var(--canvas)}
.identity-panel h2,.decision-panel h2{margin:0;font-size:17px;font-weight:600}
.identity-panel p,.decision-panel p{margin:5px 0 0;color:var(--ink-2);font-size:12px}
.identity-list{display:grid;margin:20px 0 0}
.identity-item{display:grid;gap:4px;padding:12px 0;border-top:1px solid var(--line)}
.identity-item span{color:var(--ink-3);font-size:11px}
.identity-item strong{font-size:13px;font-weight:500;overflow-wrap:anywhere}
.amount-hero{margin:20px 0;padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.amount-hero span{display:block;color:var(--ink-3);font-size:11px}
.amount-hero strong{display:block;margin-top:5px;color:var(--ink);font:400 38px/1.1 var(--mono)}
.readiness{display:grid;margin:20px 0 0;border-top:1px solid var(--line)}
.readiness-row{display:grid;grid-template-columns:8px minmax(0,1fr) auto;gap:10px;align-items:start;padding:13px 0;border-bottom:1px solid var(--line)}
.readiness-row strong{display:block;font-size:12px;font-weight:500}
.readiness-row span{display:block;margin-top:3px;color:var(--ink-2);font-size:11px}
.readiness-row .state{font-size:11px;font-weight:500;white-space:nowrap}
.notice{margin-top:20px;padding:12px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface-2);color:var(--ink-2);font-size:12px}
.notice strong{color:var(--ink);font-weight:600}
.token-inspector{position:fixed;z-index:20;top:0;right:0;width:min(360px,100vw);height:100dvh;padding:24px;overflow:auto;border-left:1px solid var(--line);background:var(--white);box-shadow:-10px 0 24px rgb(9 29 54 / .10);transform:translateX(100%);transition:transform var(--ease)}
.token-inspector.is-open{transform:translateX(0)}
.token-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:24px}
.token-head h2{margin:0;font-size:19px;font-weight:600}
.token-head p{margin:5px 0 0;color:var(--ink-2);font-size:12px}
.token-section{padding:18px 0;border-top:1px solid var(--line)}
.token-section h3{margin:0 0 12px;font-size:13px;font-weight:600}
.swatch-list{display:grid;gap:8px}
.swatch{display:grid;grid-template-columns:28px minmax(0,1fr) auto;gap:9px;align-items:center}
.swatch i{width:28px;height:28px;border:1px solid var(--line-strong);border-radius:var(--control-radius)}
.swatch strong{font-size:12px;font-weight:500}
.swatch span{color:var(--ink-3);font:400 10px/1.3 var(--mono)}
.type-list{display:grid;gap:10px}
.type-row{display:flex;justify-content:space-between;gap:12px;align-items:baseline}
.type-row strong{font-weight:500}
.type-row span{color:var(--ink-3);font:400 10px/1.3 var(--mono)}
.wire-note{margin-top:24px;padding:12px;border:1px dashed var(--line-strong);border-radius:var(--control-radius);color:var(--ink-2);font-size:11px}
.toast{position:fixed;z-index:25;right:24px;bottom:24px;max-width:340px;padding:12px 14px;border:1px solid var(--line-strong);border-radius:var(--control-radius);background:var(--ink);color:var(--white);box-shadow:var(--shadow-panel)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
@media(max-width:1080px){
  .app-shell{grid-template-columns:208px minmax(0,1fr)}
  .page{padding-inline:24px}
  .focus-grid,.content-grid,.detail-layout{grid-template-columns:1fr}
}
@media(max-width:760px){
  .app-shell{display:block}
  .sidebar{position:sticky;width:100%;height:auto;z-index:10;gap:12px;padding:14px 16px;border-right:0;border-bottom:1px solid var(--line)}
  .sidebar-section{gap:6px}
  .sidebar-label,.search-link,.sidebar-footer{display:none}
  .nav{display:flex;gap:4px;overflow:auto;padding-bottom:2px}
  .nav-item{width:auto;flex:0 0 auto;padding:8px 10px}
  .nav-copy span{display:none}
  .page{padding:24px 16px 40px}
  .page-head{display:block;margin-bottom:22px}
  .head-actions{justify-content:flex-start;margin-top:16px}
  .summary-band{grid-template-columns:repeat(2,minmax(0,1fr))}
  .summary-item:nth-child(3){border-left:0;border-top:1px solid var(--line)}
  .summary-item:nth-child(4){border-top:1px solid var(--line)}
  .pipeline-stats{grid-template-columns:repeat(2,minmax(0,1fr))}

}

  return `<aside class="token-inspector is-open" aria-label="Design token inspector"><div class="token-head"><div><h2>Design tokens</h2><p>Live values used by this preview.</p></div><button class="utility-btn" type="button" data-action="toggle-inspector">Close</button></div><section class="token-section"><h3>Color roles</h3><div class="swatch-list"><div class="swatch"><i style="background:#091d36"></i><strong>Ink</strong><span>#091D36</span></div><div class="swatch"><i style="background:#59cdc6"></i><strong>Accent</strong><span>#59CDC6</span></div><div class="swatch"><i style="background:#e3f8f7"></i><strong>Accent soft</strong><span>#E3F8F7</span></div><div class="swatch"><i style="background:#007d50"></i><strong>Success</strong><span>#007D50</span></div><div class="swatch"><i style="background:#a36e09"></i><strong>Warning</strong><span>#A36E09</span></div><div class="swatch"><i style="background:#ac312a"></i><strong>Error</strong><span>#AC312A</span></div><div class="swatch"><i style="background:#f0f7f9"></i><strong>Canvas</strong><span>#F0F7F9</span></div></div></section><section class="token-section"><h3>Type scale</h3><div class="type-list"><div class="type-row"><strong style="font-size:32px;font-weight:500">Title</strong><span>32 / 500</span></div><div class="type-row"><strong style="font-size:17px;font-weight:600">Section</strong><span>17 / 600</span></div><div class="type-row"><strong style="font-size:13px;font-weight:600">Row title</strong><span>13 / 600</span></div><div class="type-row"><strong style="font-size:14px;font-weight:400">Body</strong><span>14 / 400</span></div><div class="type-row"><strong style="font:500 14px var(--mono)">EUR 288</strong><span>DM Mono</span></div></div></section><section class="token-section"><h3>Shape and rhythm</h3><div class="type-list"><div class="type-row"><strong>Control radius</strong><span>4px</span></div><div class="type-row"><strong>Panel radius</strong><span>6px</span></div><div class="type-row"><strong>Baseline</strong><span>8px</span></div><div class="type-row"><strong>Wide grid</strong><span>12 columns / 24px gap</span></div></div></section><div class="wire-note">Implementation wire: replace the demo state store with the app router and data source without changing component contracts.</div></aside>`;
}
function currentView(){
  if(state.view==='home')return homeView();
  if(state.view==='commissions')return workbenchView('commission');
  if(state.view==='agencies')return workbenchView('agency');
  if(state.view==='detail')return detailView();
  if(state.view==='workflows')return stubView('Workflows','Bounded reminders and reports for the hotel team.');
  return stubView('Settings','Team, integrations, and setup ownership.');
}
function render(){document.querySelector('#app').innerHTML=shell(`<div class="page">${currentView()}</div>`);}
function preserveSearch(type,value){
  render();
  requestAnimationFrame(()=>{const input=document.querySelector(`[data-search="${type}"]`);if(!input)return;input.focus();const cursor=value.length;input.setSelectionRange(cursor,cursor);});
}
document.addEventListener('click',event=>{
  const target=event.target.closest('[data-action]');
  if(!target)return;
  const action=target.dataset.action;
  if(action==='toggle-inspector'){state.inspector=!state.inspector;render();return;}
  if(action==='view'){
    state.view=target.dataset.view||'home';
    if(target.dataset.filter){if(state.view==='commissions')state.commissionFilter=target.dataset.filter;if(state.view==='agencies')state.agencyFilter=target.dataset.filter;}
    state.toast='';render();return;
  }
  if(action==='filter'){
    if(target.dataset.type==='commission')state.commissionFilter=target.dataset.filter;else state.agencyFilter=target.dataset.filter;
    render();return;
  }
  if(action==='clear-search'){
    if(target.dataset.type==='commission')state.commissionQuery='';else state.agencyQuery='';
    render();return;
  }
  if(action==='select-commission'){state.commissionId=target.dataset.id;state.view='commissions';state.toast='';render();return;}
  if(action==='select-agency'){state.agencyId=target.dataset.id;state.view='agencies';state.toast='';render();return;}
  if(action==='save-resolution'){state.toast='Resolution saved';render();return;}
  if(action==='agency-request'){state.toast='Request prepared for Agency Admin';render();return;}
});
document.addEventListener('input',event=>{
  const input=event.target.closest('[data-search]');
  if(!input)return;
  const type=input.dataset.search;const value=input.value;
  if(type==='commission')state.commissionQuery=value;else state.agencyQuery=value;
  preserveSearch(type,value);
});
render();
</script>
